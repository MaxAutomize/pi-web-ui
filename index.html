<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pi — coding agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #000000;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 640px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      height: 90vh;
    }

    .header {
      text-align: center;
      padding: 32px 0 16px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      font-size: 14px;
      line-height: 1.5;
      max-width: 85%;
      padding: 10px 16px;
      border-radius: 18px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: #000;
      color: #fff;
    }

    .msg.agent {
      align-self: flex-start;
      background: #f0f0f0;
      color: #000;
    }

    .msg.agent code {
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
      font-size: 12px;
      background: #e0e0e0;
      padding: 1px 5px;
      border-radius: 4px;
    }

    .msg.agent pre {
      margin-top: 8px;
      padding: 12px;
      background: #1a1a1a;
      color: #e0e0e0;
      border-radius: 10px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.4;
    }

    .msg.agent pre code {
      background: none;
      color: inherit;
      padding: 0;
    }

    .input-area {
      padding: 16px 0 32px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      font-size: 14px;
      padding: 12px 20px;
      border: 1px solid #ddd;
      border-radius: 24px;
      outline: none;
      background: #fff;
      color: #000;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #000;
    }

    .input-area input::placeholder {
      color: #aaa;
    }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: #000;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { opacity: 0.8; }
    .send-btn:active { opacity: 0.6; }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    .typing {
      align-self: flex-start;
      font-size: 13px;
      color: #aaa;
      padding: 4px 16px;
      display: none;
    }

    .typing.show { display: block; }

    .typing span {
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>π</h1>
      <p>coding agent</p>
    </div>

    <div class="messages" id="messages"></div>

    <div class="typing" id="typing">
      <span>●</span> <span>●</span> <span>●</span>
    </div>

    <div class="input-area">
      <input type="text" id="input" placeholder="Ask pi anything…" autofocus />
      <button class="send-btn" id="send" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const typing = document.getElementById('typing');

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = role === 'agent' ? formatAgent(text) : escHtml(text);
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatAgent(text) {
      // Escape ALL HTML first to prevent XSS
      text = escHtml(text);
      // Code blocks
      text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${code.trim()}</code></pre>`
      );
      // Inline code
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Bold
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      return text;
    }

    function showTyping(on) {
      typing.classList.toggle('show', on);
      messages.scrollTop = messages.scrollHeight;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMessage(text, 'user');

      showTyping(true);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        addMessage(data.reply, 'agent');
      } catch {
        addMessage('Could not reach pi. Is the server running?', 'agent');
      }

      showTyping(false);
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

    // Welcome message
    addMessage("Hello! I'm pi, your coding agent. How can I help?", 'agent');
  </script>
</body>
</html>
